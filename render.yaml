# Render Blueprint — https://render.com/docs/blueprint-spec
#
# ■ 지금처럼 Render 만 쓰고 테스트·실험 위주일 때
#   - 이 설정(plan: free) 그대로 두면 됩니다.
#   - Render 대시보드 Environment 에서 SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY 가
#     있다면 삭제하세요. 없으면 서버가 자동으로 data/shared-state.json(비영구 디스크)에 저장합니다.
#   - 무료 인스턴스는 재배포·슬립 후에 데이터가 초기화될 수 있습니다(실험용으로 흔히 감수).
#
# ■ 나중에 데이터를 길게 남기고 싶으면(택1)
#   (A) 유료 Starter + Disks → 마운트 예: /var/companychat-data + env DATA_DIR 동일 경로
#   (B) Supabase 연동 → SUPABASE_URL + SUPABASE_SERVICE_ROLE_KEY + supabase/migrations SQL
#
services:
  - type: web
    name: companychat
    runtime: node
    plan: free
    region: singapore
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
