# Render Blueprint — https://render.com/docs/blueprint-spec
#
# 데이터 영구 저장: 무료 Web 인스턴스는 로컬 디스크가 “비영구”라 재배포·재시작 시 data/ 가 비워질 수 있습니다.
# 유지하려면 Render 대시보드 → 이 Web 서비스 →:
#   - Instance type 을 Starter(유료) 이상으로 올린 뒤
#   - Disks → Add disk → Mount path: /var/companychat-data (예: 1GB)
#   - Environment → DATA_DIR = /var/companychat-data
# (서버는 process.env.DATA_DIR 에 shared-state.json 을 씁니다.)
#
services:
  - type: web
    name: companychat
    runtime: node
    plan: free
    region: singapore
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
